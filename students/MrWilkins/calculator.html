    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
    />
  </head>
  <body class="dark-mode">
    <header>
      <div class="line center">
        <div class="big line">
          <img src="images/avatar.png" />
          <b>John</b>
        </div>
        <menu class="line">
          <a href="./">Home</a>
          <a href="./dog.html">Dog</a>
          <a href="./videos.html">Videos</a>
          <a href="./philosophy.html">Philosophy</a>
          <a href="./research.html">Research</a>
          <a href="./coding.html">Coding</a>
          <button id="color-mode-button">Light mode</button>
        </menu>
      </div>
      <ul class="center underline">
        <li class="tab">
          <a href="coding.html">About my website</a>
        </li>
        <li class="tab">
          <a href="calculator.html">Calculator</a>
        </li>
        <li class="tab">
          <a href="graffiti.html">Graffiti</a>
        </li>
      </ul>
    </header>
    <main class="center">
      <h1>Calculator</h1>

      <div class="calc-styles">
        <p id="calculator">0</p>
        <div class="calc-buttons">
          <div class="calc-reset">
            <button id="calc-button-clear">C</button>
            <button id="calc-button-plusone">+1</button>
            <button id="calc-button-minusone">-1</button>
          </div>
          <div class="calc-operators">
            <button id="calc-button-divide">÷</button>
            <button id="calc-button-multiply">×</button>
            <button id="calc-button-subtract">−</button>
            <button id="calc-button-add">+</button>
            <button id="calc-button-equal">=</button>
          </div>
          <div class="calc-entry">
            <button id="calc-button-1">1</button>
            <button id="calc-button-2">2</button>
            <button id="calc-button-3">3</button>
            <button id="calc-button-4">4</button>
            <button id="calc-button-5">5</button>
            <button id="calc-button-6">6</button>
            <button id="calc-button-7">7</button>
            <button id="calc-button-8">8</button>
            <button id="calc-button-9">9</button>
            <button id="calc-button-0">0</button>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="center">
        <p>2026-06-04</p>
      </div>
    </footer>
    <script src="scripts/color-mode.js"></script>
    <script src="scripts/counter.js"></script>
  </body>
