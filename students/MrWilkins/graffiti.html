  <body class="dark-mode">
    <header>
      <div class="line center">
        <div class="big line">
          <img src="images/avatar.png" />

        </div>
        <menu class="line">

          <a href="./dog.html">Dog</a>

    <main class="center">
      <h1>Graffiti</h1>

      <div class="dog-picture">
        <div class="art-frame">
          <img class="art" src="./images/not-my-dog.jpg" width="400" />
          <canvas id="my-graffiti" width="400" height="400"> </canvas>
        </div>

        <label>
          Tool:
          <select id="tool-select">
            <option value="eraser">Eraser</option>
            <option value="pen" selected>Pen</option>
          </select>
        </label>
        <label>
          Color:
          <input type="color" value="purple" id="color-input" />
        </label>
        <label>
          Size:
          <input type="range" min="1" max="20" value="10" id="size-input" />
        </label>
      </div>
    </main>
    <footer>
      <div class="center">
        <p>2026-06-04</p>
