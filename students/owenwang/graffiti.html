            <div class="big line">

            <menu class="line">

    <main class="center">
        <h1>Graffiti</h1>
        <div>
            <div class="canvas-frame">
                <img class="canvas" src="./images/yuta canvas.png" width="400">
                <canvas id="my-graffiti" width="800" height="426"></canvas>
            </div>
            <label>
                Tool:
                <select id="tool-select">
                    <option value="eraser">Eraser</option>
                    <option value="pen" selected>Pen</option>
                </select>
            </label>
            <label>
                Color:
                <input type="color" value="magenta" id="color-input">
            </label>
            <label>
                Size:
                <input type="range" min="1" max="100" value="10" id="size-input">
            </label>
            <details>
                <summary>More tools</summary>
                <p>GitHub is SLOW.</p>
            </details>
        </div>
    </main>
    <footer>
        <div class="center">
