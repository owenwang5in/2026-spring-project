        <h1>
            Graffiti ᯓ★
        </h1>
        <div class="dog-picture" id="dog-picture">
            <div class="art-frame">
            <img class="art" src="./Images/ao3.webp" width="290">
            <canvas id="graffiti" width="400" height="400"></canvas>
        </div>
        <label>
            Tool
            <select id="tselect">
                <option value="eraser">Eraser</option>

        </label>
        <label>
            Color:
            <input type="color" value="gray" id="colinput">
        </label>
    </br>
         <label>
            Size:
            <input type="range" max="50" min="1" value="10" id="siinput">
        </label>
        <details>
            <summary>more tools</summary>
            <figure class="mustache-box">
            <img src="../../images/mustache.png" id="mustache">
            <figcaption>A funny little mustache</figcaption>
        </figure>
        </details>

    </div>
