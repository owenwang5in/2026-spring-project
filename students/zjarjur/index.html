<!DOCTYPE html>
<html lang="En">

<head>
    <link id="whichSheet" rel="stylesheet" href="./styles/dark.css">
    <title>
        Mr. Jarjur's Page
    </title>

    <script>
        let mode = 1;
        const linkElement = document.getElementById('whichSheet');
        const light = "./styles/light.css";
        const dark = "./styles/dark.css";



        function changeMode() {
            if (mode === 0) {
                linkElement.setAttribute('href', dark);
                mode = 1;
            } else {
                linkElement.setAttribute('href', light);
                mode = 0;
            }

        }

        function howAreYou() {
            let mood = prompt("How are you feeling?");
            if (mood === "sleepy") {
                alert("Wake Up!");
            } else {
                alert("Oh! You are feeling " + mood + ".");
            }

        }
    </script>
</head>

<body>
    <h1>
        The Page of Ultimate Z-ness
    </h1>

    <button onclick="changeMode();">Change Mode</button>
    <button onclick="howAreYou();">How Are You?</button>
    <img src="./images/Dog Example 1.png" width = 500>
    
    <footer>
        <p>
            
            This space for rent
        </p>
        <p>
            Look at that weiner dog go!
        </p>

    </footer>
</body>

</html>
