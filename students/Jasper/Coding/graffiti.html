<!DOCTYPE html>
<html>

<head>
    <title>
        Graffiti
    </title>
    <link rel="stylesheet" href="../styles/page.css">
    <link rel="stylesheet" href="../styles/graffiti.css">
</head>

<body class="dark-mode">

    <header>
        <div class="center line">
            <div class="line big">
                <img src="../images/avatar.png">
                <b>Jasper</b>
            </div>
            <menu class="line">
                <a href="../">Home</a>
                <a href="../Dog/dog.html">Dog</a>
                <a href="../Videos/videos.html">Videos</a>
                <a href="../Philosophy/philosophy.html">Philosophy</a>
                <a href="../Research/research.html">Research</a>
                <a href="./coding.html">Coding</a>
                <button id="color-mode-button">
                    Light mode
                </button>
            </menu>
        </div>
        <ul class="center underline">
            <li class="tab"><a href="./coding.html">About My Website</a></li>
            <li class="tab"><a href="./calculater.html">Calculater</a></li>
            <li class="tab"><a href="./graffiti.html">Graffiti</a></li>
        </ul>
    </header>
    <main class="center">
        <h1>Graffiti</h1>
        <div class="dog-picture" id="dog-picture">
            <div class="art-frame">
                <img class="art" src="../images/P_20260413_111320.jpg" width=400>
                <canvas id="my-graffiti" width="400" height="400">
                </canvas>
            </div>

            <label>
                Tool
                <select id="tool-select">
                    <option value="eraser">Erasre</option>
                    <option value="pen selected">Pen</option>
                </select>
            </label>
            <label>
                Color:
                <input type="color" value="black" id="color-input">
            </label>
            <label>
                Size:
                <input type="range" min="1" max="100" value="10" id="size-input">
            </label>
            <details>
                <summary>More tools</summary>
                <figure>
                    <figcaption>A funny little mustache</figcaption>
                    <img src="../../../images/mustache.png" id="mustache">
                    <figcaption>click it one time and move it!</figcaption>
                    <figcaption>click it one more time to stick it!</figcaption>
                </figure>
            </details>
        </div>
    </main>
    <footer>
        <div class="center">
            <p>2026/6/1</p>
        </div>
    </footer>
    <script src=" ../scripts/color-mode.js"></script>
    <script src=" ../scripts/graffiti.js" type="module"></script>
</body>

</html>
